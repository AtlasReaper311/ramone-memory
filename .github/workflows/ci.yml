# CI gate for ramone-memory: the ollama-rag-kit pattern. Syntax-check
# every module, prove the image builds, report to #ci-cd via direct
# curl (workflows are self-contained; they never depend on the router
# being up to report their own outcomes).
#
# workflow_dispatch is declared from day one so ramone-voice-trigger
# can fire this repo without a follow-up patch.

name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.repository }}-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.0, Node 24

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0, Node 24
        with:
          python-version: "3.12"

      - name: Syntax-check every module
        run: python -m compileall app

      - name: Prove the image builds
        run: docker compose build

  # CI result reported through the reusable atlas-notify workflow:
  # routes to #ci-cd via signal_class, failures mirror to #alerts.
  notify:
    needs: build
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: AtlasReaper311/atlas-notify/.github/workflows/notify.yml@4485013d9a432d4759ce025fa9bc73aa6a2d9c7f # atlas-notify main: channel routing
    with:
      status: ${{ needs.build.result }}
      kind: ci
      signal_class: cicd
    secrets:
      NOTIFY_TOKEN: ${{ secrets.NOTIFY_TOKEN }}
